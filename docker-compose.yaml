networks:
  app-network:
    driver: bridge

services:
  mysql-auth:
    image: mysql:8.0
    container_name: wb-ip-ams-mysql-auth
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_AUTH_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${AUTH_DB_DATABASE:-auth_service_db}
      MYSQL_USER: ${AUTH_DB_USERNAME:-auth_user}
      MYSQL_PASSWORD: ${AUTH_DB_PASSWORD:-auth_secret}
    ports:
      - "${AUTH_DB_PORT:-3307}:3306"
    volumes:
      - mysql-auth-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-ip:
    image: mysql:8.0
    container_name: wb-ip-ams-mysql-ip
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_IP_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${IP_DB_DATABASE:-ip_service_db}
      MYSQL_USER: ${IP_DB_USERNAME:-ip_user}
      MYSQL_PASSWORD: ${IP_DB_PASSWORD:-ip_secret}
    ports:
      - "${IP_DB_PORT:-3308}:3306"
    volumes:
      - mysql-ip-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./app/auth-service
    container_name: wb-ip-ams-auth-service
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql-auth
      DB_PORT: 3306
      DB_DATABASE: ${AUTH_DB_DATABASE:-auth_service_db}
      DB_USERNAME: ${AUTH_DB_USERNAME:-auth_user}
      DB_PASSWORD: ${AUTH_DB_PASSWORD:-auth_secret}
      JWT_ALGO: RS256
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?JWT_PRIVATE_KEY is required}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?JWT_PUBLIC_KEY is required}
      JWT_TTL: ${JWT_TTL:-1440}
      IP_SERVICE_URL: http://ip-service:8000
      INTERNAL_SECRET: ${INTERNAL_SECRET:-change-me-internal-secret}
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      LOG_CHANNEL: stderr
      LOG_LEVEL: error
    depends_on:
      mysql-auth:
        condition: service_healthy
    restart: on-failure
    networks:
      - app-network

  ip-service:
    build:
      context: ./app/ip-service
    container_name: wb-ip-ams-ip-service
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8001
      DB_CONNECTION: mysql
      DB_HOST: mysql-ip
      DB_PORT: 3306
      DB_DATABASE: ${IP_DB_DATABASE:-ip_service_db}
      DB_USERNAME: ${IP_DB_USERNAME:-ip_user}
      DB_PASSWORD: ${IP_DB_PASSWORD:-ip_secret}
      JWT_ALGO: RS256
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?JWT_PUBLIC_KEY is required}
      JWT_TTL: ${JWT_TTL:-1440}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-change-me-internal-secret}
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      LOG_CHANNEL: stderr
      LOG_LEVEL: error
    depends_on:
      mysql-ip:
        condition: service_healthy
    restart: on-failure
    networks:
      - app-network

  gateway:
    build:
      context: ./app/gateway
    container_name: wb-ip-ams-gateway
    ports:
      - "${GATEWAY_PORT:-3000}:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${GATEWAY_APP_URL:-http://localhost:3000}
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/database/database.sqlite
      AUTH_SERVICE_URL: http://auth-service:8000
      IP_SERVICE_URL: http://ip-service:8000
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      LOG_CHANNEL: stderr
      LOG_LEVEL: error
    depends_on:
      - auth-service
      - ip-service
    restart: on-failure
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: app/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api}
    container_name: wb-ip-ams-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - gateway
    networks:
      - app-network

volumes:
  mysql-auth-data:
  mysql-ip-data:
